server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 8.8.8.8 114.114.114.114 valid=30s ipv6=off;
    resolver_timeout 5s;

    # Ontology DaaS reverse proxy — avoids browser CORS failure
    location /api/ontology/ {
        set $upstream ceshi.projects.bingosoft.net;
        proxy_pass http://$upstream:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host ceshi.projects.bingosoft.net;
        proxy_set_header Authorization "Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJCaW5nb1NvZnQiLCJhdWQiOiJCaW5nb1NvZnQiLCJzdWIiOiJEYWFzIiwiaWF0IjoxNzgwNzQwMzc3LCJleHAiOjE3ODEzNDUxNzcsImFjY2Vzc0tleSI6IkZFNEEwRDEyQzQ5Qjc3NTgxMjNGIn0.BlOLX9QGChwgEEWDTZPwjAR1ej9CacJHWRlefMi82t8";
        proxy_set_header Spaceid "733b385695ae43eb9ee54ef9f4a9507a";
        proxy_set_header scopeType "Space";
        proxy_set_header Content-Type "application/json";
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
