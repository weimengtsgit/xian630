server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Runtime DNS resolution via variables so nginx doesn't crash at startup
    # when DNS is temporarily unreachable (common in Podman without dns_enabled).
    # Docker uses 127.0.0.11; Podman aardvark-dns typically listens on the
    # network gateway (e.g. 10.89.0.1). Public resolvers are fallbacks for
    # external upstreams like api.open-meteo.com.
    resolver 127.0.0.11 8.8.8.8 114.114.114.114 valid=30s ipv6=off;
    resolver_timeout 5s;

    # Factory REST + SSE -> factory container. proxy_buffering off is REQUIRED
    # for SSE; long timeouts for generation runs.
    location /api/ {
        set $factory_upstream factory:8787;
        proxy_pass http://$factory_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    location = /healthz {
        set $factory_upstream factory:8787;
        proxy_pass http://$factory_upstream;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
