# Software Factory — deploy with pre-built artifacts.
# 1) Edit .env to set ANTHROPIC_* vars + CONTAINER_SOCK.
# 2) podman compose up -d --build   (or: docker compose up -d --build)
name: sf

services:
  factory:
    build:
      context: .
      dockerfile: Dockerfile.factory
    image: sf-factory:latest
    env_file: [.env]
    environment:
      FACTORY_ADDR: 0.0.0.0:8787
      DOCKER_HOST: unix:///var/run/runtime.sock
      CONTAINER_HOST: unix:///var/run/runtime.sock
      HOME: /root
      FACTORY_HEALTH_HOST: ${FACTORY_HEALTH_HOST:-host-gateway}
      FACTORY_APP_URL_HOST: ${FACTORY_APP_URL_HOST:-host-gateway}
    extra_hosts:
      - "host-gateway:host-gateway"
    volumes:
      - ${CONTAINER_SOCK}:/var/run/runtime.sock
      - sf-data:/data
      - sf-apps:/workspace/generated-apps
      - sf-claude:/root/.claude
    restart: unless-stopped

  portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
    image: sf-portal:latest
    ports:
      - "${PORTAL_PORT:-80}:80"
    depends_on: [factory]
    restart: unless-stopped

volumes:
  sf-data:
  sf-apps:
  sf-claude:
