# Software Factory — runtime-agnostic compose (works on a Podman OR Docker host).
# 1) cp .env.example .env  2) set CONTAINER_SOCK + FACTORY_CONTAINER_RUNTIME for
# your host, and ANTHROPIC_API_KEY for real generation.  3) (from deploy/)
#   podman compose up -d --build     # or: docker compose up -d --build
name: sf

services:
  factory:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.factory
    image: sf-factory:feat-0622
    env_file: [.env]
    environment:
      # Bind all interfaces so the portal container can reach it on the network.
      FACTORY_ADDR: 0.0.0.0:8787
      # Point the container's docker/podman CLIs at the HOST runtime socket.
      DOCKER_HOST: unix:///var/run/runtime.sock
      CONTAINER_HOST: unix:///var/run/runtime.sock
      HOME: /root
      # Generated apps are published on the HOST; factory runs in a container, so
      # the readiness probe must go via the container→host gateway, and the
      # user-facing app URL carries the externally reachable host (override per
      # site in .env, e.g. the public or internal IP users browse with).
      FACTORY_HEALTH_HOST: ${FACTORY_HEALTH_HOST:-host-gateway}
      FACTORY_APP_URL_HOST: ${FACTORY_APP_URL_HOST:-host-gateway}
    extra_hosts:
      # Resolves the "host-gateway" token to the host's bridge IP on both Docker
      # and Podman, letting the factory probe host-published app ports.
      - "host-gateway:host-gateway"
    volumes:
      - ${CONTAINER_SOCK}:/var/run/runtime.sock
      - sf-data:/data
      - sf-apps:/workspace/generated-apps
      - sf-claude:/root/.claude
    restart: unless-stopped
    # NOT published: reachable only from the portal via the compose network,
    # so the only public surface is the portal on ${PORTAL_PORT}.

  portal:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.portal
      args:
        VITE_FACTORY_API_BASE_URL: ""
    image: sf-portal:feat-0622
    ports:
      - "${PORTAL_PORT:-80}:80"
    depends_on: [factory]
    restart: unless-stopped

volumes:
  sf-data:    # SQLite state.db + .factory-runs artifacts/logs
  sf-apps:    # generated-apps/<slug>/ (the podman build contexts)
  sf-claude:  # ~/.claude config/cache
