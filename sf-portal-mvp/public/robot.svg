<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <g fill="#fff">
    <!-- antenna -->
    <rect x="30" y="8" width="4" height="8" rx="2"/>
    <circle cx="32" cy="7" r="3"/>
    <!-- head -->
    <rect x="14" y="16" width="36" height="24" rx="7"/>
    <!-- eyes -->
    <circle cx="24" cy="28" r="4" fill="#1d4ed8"/>
    <circle cx="40" cy="28" r="4" fill="#1d4ed8"/>
    <!-- mouth -->
    <rect x="24" y="34" width="16" height="3" rx="1.5"/>
    <!-- body -->
    <rect x="18" y="44" width="28" height="14" rx="4"/>
    <!-- body light -->
    <circle cx="32" cy="51" r="3" fill="#93c5fd"/>
  </g>
</svg>
